name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r src-python/requirements-dev.txt

      - name: Run pytest
        run: |
          cd src-python
          pytest --cov=app --cov-report=term-missing -v

  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sgaf/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test -- --run

  tauri-build:
    name: Tauri Build (${{ matrix.os }})
    needs: [backend-tests, frontend-tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            binary_name: sgaf-backend
            binary_dest: src-tauri/binaries/sgaf-backend-x86_64-unknown-linux-gnu
            artifact_path: |
              src-tauri/target/release/bundle/appimage/*.AppImage
          - os: windows-latest
            platform: windows
            binary_name: sgaf-backend.exe
            binary_dest: src-tauri/binaries/sgaf-backend-x86_64-pc-windows-msvc.exe
            artifact_path: |
              src-tauri/target/release/bundle/msi/*.msi

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sgaf/package-lock.json

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Python deps and build sidecar
        run: |
          pip install -r src-python/requirements.txt pyinstaller
          cd src-python && pyinstaller sgaf.spec --distpath dist --workpath build

      - name: Copy sidecar binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cp src-python/dist/sgaf-backend ${{ matrix.binary_dest }}

      - name: Copy sidecar binary (Windows)
        if: matrix.os == 'windows-latest'
        run: cp src-python/dist/sgaf-backend.exe ${{ matrix.binary_dest }}

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: sgaf-installer-${{ matrix.platform }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 30
